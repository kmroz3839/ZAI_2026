{% extends 'base.html' %}

{% block content %}

<h1>Potwierdź usunięcie projektu</h1>
<p>Usunąć projekt "{{ project.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Usuń</button>
</form>

<br>
<a class="btn btn-secondary" href="{% url 'project_detail' project.pk %}">Anuluj</a>

{% endblock %}
