{% extends 'base.html' %}

{% block content %}

<h1>Szczegóły projektu</h1>
<p>Nazwa: {{ project.name }}</p>
<p>Opis: {{ project.description }}</p>
<p>Utworzono: {{ project.created_at }}</p>

<a class="btn btn-danger" href="{% url 'project_delete' project.pk %}">Usuń projekt</a>
<a class="btn btn-primary" href="{% url 'project_edit' project.pk %}">Edytuj projekt</a>
<a class="btn btn-secondary" href="{% url 'project_list' %}">Powrót do listy</a>

{% endblock %}
