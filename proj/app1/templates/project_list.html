{% extends 'base.html' %}

{% block content %}

<h1>Lista projektów</h1>
{% if projects %}
<div class="list-group">
    {% for project in projects %}
        <a href="{% url 'project_detail' project.pk %}" class="list-group-item list-group-item-action">
            {{ project.name }}
            <br>
            <p class="mb-1"><small>{{ project.description }}</small></p>
        </a>
    {% endfor %}
</div>
{% else %}
<p>Brak projektów.</p>
{% endif %}

<br>
<a class="btn btn-primary" href="{% url 'project_add' %}">Dodaj nowy projekt</a>

{% endblock %}
