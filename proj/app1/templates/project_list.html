{% extends 'base.html' %}

{% block content %}

<h1>Lista projektów</h1>
{% if projects %}
<ul>
    {% for project in projects %}
        <li><a href="{% url 'project_detail' project.pk %}">{{ project.name }}</a> | {{ project.description }}</li>
    {% endfor %}
</ul>
{% else %}
<p>Brak projektów.</p>
{% endif %}

<p><a href="{% url 'project_add' %}">Dodaj nowy projekt</a></p>

{% endblock %}
