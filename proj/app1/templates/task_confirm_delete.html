{% extends 'base.html' %}

{% block content %}

<h1>Potwierdź usunięcie zadania</h1>
<p>Usunąć zadanie "{{ task.title }}"?</p>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Usuń</button>
</form>

<br>
<a class="btn btn-secondary" href="{% url 'task_detail' task.pk %}">Anuluj</a>

{% endblock %}
